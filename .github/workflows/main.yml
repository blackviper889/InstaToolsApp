name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet pyotp instaloader

      - name: Build APK
        run: |
          flet build apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: InstaTurboApp
          path: build/apk/*.apk
